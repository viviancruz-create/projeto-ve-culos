<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desenvolver uma aplicação web simples para cadastro de
        veículos usando as tecnologias web.</title>
        <script src="js/script_veiculo.js" defer></script>
        <link rel="stylesheet" href="css/style_veiculos.css">
</head>
<body>
    <form>
        <label for="modelo">Modelo:</label>
        <input type="text" name="modelo" id="modelo"><br>

        <label for="marca">Marca:</label>
        <input type="text" name="marca" id="marca"><br>

        <label for="placa">Placa:</label>
        <input type="text" name="placa" id="placa"><br>

        <label for="fabricado"> Fabricado:</label>
        <input type="text" name="fabricado" id="fabricado"><br>

         <label for="valor">Valor:</label>
         <input type="text" name="valor" id="valor">

         <label for="combustivel">Combustivel:</label>
         <input type="text" name="combustivel" id="combustivel">

         <button type="submit">Adicionar</button>
         <button type="reset">Limpar</button>


    </form>
    <hr>
    <div id="lista veiculos"></div>
</body>
</html>
